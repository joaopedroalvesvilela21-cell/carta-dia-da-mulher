<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Para Você </title>
    <style>
        body {
            background: linear-gradient(to right, #ff99cc, #ffccff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
            text-align: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 0px 25px #ff66b2;
            width: 350px;
        }

        h1 {
            color: #ff3399;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #ff66b2;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }

        #mensagem {
            margin-top: 20px;
            display: none;
            font-size: 18px;
            color: #444;     
        }
        .fotos{
            margin-top: 20px;
        }

        .fotos img{
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 15px;
            margin: 5px;
            box-shadow: 0px 0px 10px pink;
            transition: transform 0.3s;
        }

        .fotos img:hover{
            transform: scale(1.1);
        }
    
    </style>
    
</head>

<body>
    <div class="card">
        <h1>Feliz Dia da Mulher </h1>
        <button onclick="mostrarMensagem()">Clique aqui </button>
        <div id="mensagem">
            Voce e a mulher da minha vida e futura mae dos meus filhos I LOVE YOU
            <div class="fotos">
                <img src="/imagens/foto1.jpg">
                <img src="/imagens/foto2.jpg">
                <img src="/imagens/foto3.jpg">
            </div>
        </div>
    </div>

    <script>
        function mostrarMensagem() {
            document.getElementById("mensagem").style.display = "block";
        }
    </script>
</body>
</html>
